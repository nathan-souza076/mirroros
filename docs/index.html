<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MirrorOS Loop Player</title>
    <link rel="stylesheet" href="styles.css?v=16">
  </head>
  <body>
    <main class="app-shell" id="appShell">
      <header class="topbar">
        <div>
          <p class="eyebrow">MirrorOS</p>
          <h1>TV Player</h1>
        </div>

        <div class="toolbar" role="group" aria-label="Filtros e comandos">
          <div class="segmented" aria-label="Tipo de midia">
            <button class="segment is-active" type="button" data-filter="all">Tudo</button>
            <button class="segment" type="button" data-filter="video">Videos</button>
            <button class="segment" type="button" data-filter="image">Imagens</button>
          </div>
          <button class="icon-button" type="button" id="refreshButton" aria-label="Atualizar lista" title="Atualizar">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M21 12a9 9 0 0 1-15.12 6.64M3 12A9 9 0 0 1 18.12 5.36M21 5v6h-6M3 19v-6h6"/>
            </svg>
          </button>
        </div>
      </header>

      <section class="overview">
        <div>
          <span class="overview-label">Biblioteca</span>
          <strong id="mediaCount">0</strong>
        </div>
        <div>
          <span class="overview-label">Modo</span>
          <strong>Loop TV</strong>
        </div>
        <div>
          <span class="overview-label">Status</span>
          <strong id="statusLine" aria-live="polite">Carregando</strong>
        </div>
      </section>

      <section class="media-grid" id="mediaGrid" aria-label="Midias disponiveis"></section>

      <footer class="site-credit">Powered by Nathan Souza</footer>
    </main>

    <section class="player" id="player" aria-hidden="true">
      <div class="stage" id="stage"></div>
      <div class="player-chrome">
        <div class="player-actions">
          <button class="chrome-button" type="button" id="previousButton" aria-label="Anterior" title="Anterior">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="m15 18-6-6 6-6"/>
              <path d="M6 6v12"/>
            </svg>
          </button>
          <button class="chrome-button primary-control" type="button" id="playPauseButton" aria-label="Pausar" title="Pausar">
            <svg class="pause-icon" aria-hidden="true" viewBox="0 0 24 24">
              <path d="M8 5v14"/>
              <path d="M16 5v14"/>
            </svg>
            <svg class="play-icon" aria-hidden="true" viewBox="0 0 24 24">
              <path d="m8 5 11 7-11 7V5Z"/>
            </svg>
          </button>
          <button class="chrome-button" type="button" id="nextButton" aria-label="Proximo" title="Proximo">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="m9 18 6-6-6-6"/>
              <path d="M18 6v12"/>
            </svg>
          </button>
          <button class="chrome-button" type="button" id="infoButton" aria-label="Mostrar informacoes" title="Informacoes">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M12 17v-6"/>
              <path d="M12 7h.01"/>
              <circle cx="12" cy="12" r="9"/>
            </svg>
          </button>
          <button class="chrome-button" type="button" id="fitButton" aria-label="Preencher tela" title="Preencher tela">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M3 9V5a2 2 0 0 1 2-2h4"/>
              <path d="M15 3h4a2 2 0 0 1 2 2v4"/>
              <path d="M21 15v4a2 2 0 0 1-2 2h-4"/>
              <path d="M9 21H5a2 2 0 0 1-2-2v-4"/>
              <path d="M8 12h8"/>
            </svg>
          </button>
          <button class="chrome-button" type="button" id="fullscreenButton" aria-label="Tela cheia" title="Tela cheia">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M8 3H3v5M21 8V3h-5M3 16v5h5M16 21h5v-5"/>
            </svg>
          </button>
          <button class="chrome-button" type="button" id="minimizeControlsButton" aria-label="Minimizar controles" title="Minimizar controles">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M8 12h8"/>
            </svg>
          </button>
          <button class="chrome-button" type="button" id="closeButton" aria-label="Sair" title="Sair">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M18 6 6 18M6 6l12 12"/>
            </svg>
          </button>
        </div>
      </div>
      <button class="restore-controls" type="button" id="restoreControlsButton" aria-label="Mostrar controles" title="Mostrar controles">
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <path d="M4 8h16"/>
          <path d="M4 16h16"/>
          <path d="M9 4v8"/>
          <path d="M15 12v8"/>
        </svg>
      </button>
      <div class="now-playing" id="nowPlaying">
        <span class="media-kind" id="mediaKind"></span>
        <strong id="mediaTitle"></strong>
      </div>
    </section>

    <template id="mediaCardTemplate">
      <button class="media-card" type="button">
        <span class="thumb">
          <span class="thumb-icon"></span>
        </span>
        <span class="card-body">
          <span class="card-title"></span>
          <span class="card-meta"></span>
        </span>
      </button>
    </template>

    <script src="media-manifest.js?v=16"></script>
    <script src="app.js?v=16"></script>
  </body>
</html>
